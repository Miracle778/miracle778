<svg width="1100" height="410" viewBox="0 0 1100 410" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1100" height="410" rx="18" fill="#F6F8FA"/>
  <rect x="28" y="26" width="1044" height="358" rx="14" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text x="56" y="70" fill="#24292F" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="750">What I'm Exploring</text>
  <text x="56" y="96" fill="#57606A" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="13">questions.from.chatgpt-teacher / still-learning</text>
  <line x1="56" y1="118" x2="1044" y2="118" stroke="#D8DEE4"/>

  <text x="72" y="154" fill="#57606A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">下面这些是之前跟 ChatGPT 老师各种讨论后梳理出来的问题，有些只是想法，有些会慢慢实践。</text>

  <circle cx="74" cy="198" r="4" fill="#0969DA"/>
  <text x="94" y="204" fill="#24292F" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Agent 如何具备可治理的身份，而不是只靠一串 API Key 到处跑。</text>
  <circle cx="74" cy="238" r="4" fill="#0969DA"/>
  <text x="94" y="244" fill="#24292F" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Tool Calling 如何做审计、记录、策略控制和权限收敛。</text>
  <circle cx="74" cy="278" r="4" fill="#0969DA"/>
  <text x="94" y="284" fill="#24292F" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Agent 框架如何接入外部治理层，避免安全能力只停留在 prompt 里。</text>
  <circle cx="74" cy="318" r="4" fill="#0969DA"/>
  <text x="94" y="324" fill="#24292F" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">多 Agent 系统里的权限边界、调用链路和责任边界该怎么表达。</text>
  <circle cx="74" cy="358" r="4" fill="#0969DA"/>
  <text x="94" y="364" fill="#24292F" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">AI Gateway / Agent Mesh 是否能承载统一的安全治理能力。</text>
</svg>
